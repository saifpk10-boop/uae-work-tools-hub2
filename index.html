<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UAE Work Hub</title>

<style>
body{
font-family:Arial;
margin:0;
background:#f5f6f8;
}

header{
background:#0b6623;
color:white;
text-align:center;
padding:20px;
}

.container{
padding:15px;
display:grid;
gap:15px;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
}

.card{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

input,button{
width:100%;
padding:10px;
margin-top:8px;
border-radius:6px;
border:1px solid #ccc;
}

button{
background:#0b6623;
color:white;
border:none;
}

.result{
margin-top:10px;
background:#eaffea;
padding:10px;
border-left:4px solid green;
white-space:pre-line;
}

footer{
text-align:center;
padding:15px;
background:#222;
color:white;
font-size:12px;
}
</style>

<script>
function risk(){
let a=document.getElementById("activity").value;
if(!a){alert("Enter activity");return;}

document.getElementById("out").innerText =
"RISK ASSESSMENT\n\nActivity: "+a+
"\n\nHazards:\n- Slips\n- Trips\n- Falling objects\n\nControls:\n- PPE\n- Safety supervision\n- Work permit\n\nRisk Level: Medium";
}
</script>

</head>

<body>

<header>
<h1>UAE Work Hub</h1>
<p>Simple Safety & Work Tools</p>
</header>

<div class="container">

<div class="card">
<h3>⚠ Risk Assessment Tool</h3>
<input id="activity" placeholder="Enter work activity">
<button onclick="risk()">Generate</button>
<div class="result" id="out"></div>
</div>

<div class="card">
<h3>💡 About</h3>
<p>This website provides simple tools for construction workers and professionals in UAE.</p>
</div>

</div>

<footer>
© 2026 UAE Work Hub
</footer>

</body>
</html>
